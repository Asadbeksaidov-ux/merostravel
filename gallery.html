    <style>
        /* Gallery Specific Styles */
        :root {
            --premium-gold: #d4af37;
            --dark-overlay: rgba(0, 0, 0, 0.7);
        }

        .gallery-hero {
            height: 60vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 2s ease-out;
            transform: scale(1.05);
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        .gallery-hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.7));
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 0 20px;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero-content p {
            font-size: 1.2rem;
            color: var(--premium-gold);
            font-weight: 300;
        }

        .gallery-container {
            padding: 4rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            grid-auto-rows: 250px;
            gap: 20px;
            grid-auto-flow: dense;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Large items */
        .gallery-item.wide {
            grid-column: span 2;
        }

        .gallery-item.tall {
            grid-row: span 2;
        }

        .gallery-item.big {
            grid-column: span 2;
            grid-row: span 2;
        }

        .item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .item-overlay {
            opacity: 1;
        }

        .item-overlay i {
            color: white;
            font-size: 2rem;
            transform: scale(0.5);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .item-overlay i {
            transform: scale(1);
        }

        /* Gallery Section Header */
        .gallery-section-header {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem 0 1rem;
            margin-top: 2rem;
        }

        .gallery-section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--premium-gold);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .gallery-section-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            font-style: italic;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            max-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .lightbox-content img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border: 3px solid var(--premium-gold);
            box-sizing: border-box;
        }

        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 10001;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            transform: translateY(-50%);
            box-sizing: border-box;
            left: 0;
            z-index: 10000;
        }

        .nav-btn {
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(212, 175, 55, 0.2);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--premium-gold);
            color: black;
        }

        @media (max-width: 768px) {
            .gallery-hero h1 {
                font-size: 2.2rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: 250px;
                /* Uniform height for all images on mobile */
            }

            .gallery-item.wide,
            .gallery-item.tall,
            .gallery-item.big {
                grid-column: span 1 !important;
                grid-row: span 1 !important;
            }

            .lightbox-nav {
                padding: 0 5px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
                font-size: 1.5rem;
            }

            .close-lightbox {
                top: 15px;
                right: 15px;
                font-size: 2rem;
            }
        }
    </style>
</head>
